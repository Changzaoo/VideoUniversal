services:
  - type: web
    name: videouniversal-backend
    runtime: docker
    repo: https://github.com/Changzaoo/VideoUniversal
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: YTDLP_BIN
        value: "yt-dlp"
      - key: STREAM_DOWNLOADS
        value: "false"
      - key: FFMPEG_BIN
        value: "ffmpeg"
      - key: YTDLP_COOKIES_BASE64
        sync: false
      - key: YTDLP_PROXY
        sync: false
      - key: YTDLP_EXTRACTOR_ARGS
        value: "youtube:player_client=android_vr,ios,web"
      - key: ALLOWED_ORIGINS
        value: "https://videouniversal.vercel.app"
      - key: ADMIN_TOKEN
        sync: false
